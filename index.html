<!DOCTYPE html>
<html class="dark" lang="zh-CN">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>导航首页</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link href="index.css" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "on-primary-fixed-variant": "#5a5c5c",
                        "on-surface": "#e5e5e5",
                        "primary-fixed": "#e2e2e2",
                        "on-tertiary": "#001e4a",
                        "on-primary-container": "#d0d0d0",
                        "on-error": "#490106",
                        "on-tertiary-fixed": "#000000",
                        "background": "#0e0e0e",
                        "on-secondary": "#202020",
                        "primary-dim": "#b8b9b9",
                        "on-surface-variant": "#ababab",
                        "surface-container-highest": "#262626",
                        "on-primary": "#3f4041",
                        "surface-tint": "#c6c6c6",
                        "on-primary-fixed": "#3e4040",
                        "tertiary-container": "#4d8efe",
                        "secondary-container": "#3b3b3b",
                        "secondary-dim": "#9f9d9d",
                        "tertiary": "#689cff",
                        "surface-container-low": "#131313",
                        "on-secondary-fixed-variant": "#5c5b5b",
                        "on-secondary-container": "#c1bfbe",
                        "primary-fixed-dim": "#d4d4d4",
                        "tertiary-fixed-dim": "#3d81f0",
                        "on-tertiary-fixed-variant": "#001a42",
                        "on-secondary-fixed": "#3f3f3f",
                        "secondary": "#9f9d9d",
                        "on-background": "#e5e5e5",
                        "tertiary-fixed": "#4d8efe",
                        "surface-variant": "#262626",
                        "primary": "#c6c6c6",
                        "inverse-on-surface": "#555555",
                        "error-container": "#7f2927",
                        "tertiary-dim": "#689cff",
                        "surface-dim": "#0e0e0e",
                        "inverse-primary": "#5e5f5f",
                        "secondary-fixed": "#e4e2e1",
                        "outline-variant": "#484848",
                        "error-dim": "#bb5551",
                        "error": "#ee7d77",
                        "surface": "#0e0e0e",
                        "inverse-surface": "#f9f9f9",
                        "surface-container-lowest": "#000000",
                        "on-tertiary-container": "#000e29",
                        "secondary-fixed-dim": "#d6d4d3",
                        "on-error-container": "#ff9993",
                        "surface-container-high": "#1f1f1f",
                        "outline": "#757575",
                        "surface-bright": "#2c2c2c",
                        "surface-container": "#191919",
                        "primary-container": "#454747"
                    },
                    fontFamily: {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px", "eight": "0.5rem" },
                },
            },
        }
    </script>
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-surface-dim dark:text-on-surface selection:bg-tertiary/30 transition-colors duration-300">
    <!-- THEME TOGGLE BUTTON -->
    <button id="theme-toggle" class="fixed top-2 right-2 md:top-6 md:right-6 z-[60] w-8 h-8 md:w-12 md:h-12 rounded-full bg-white dark:bg-surface-container-highest border border-gray-200 dark:border-outline-variant/30 flex items-center justify-center text-gray-700 dark:text-on-surface hover:bg-gray-100 dark:hover:bg-surface-bright hover:scale-110 transition-all duration-300 shadow-lg">
        <span id="theme-icon" class="material-symbols-outlined text-lg md:text-2xl">light_mode</span>
    </button>

    <main class="min-h-screen flex flex-col relative">
        
        <!-- INITIAL CENTERED CONTAINER -->
        <!-- 增加了 min-h-[120vh] 强制出现滚动条，并将内容完全居中 -->
        <div id="initial-view" class="flex-col items-center justify-center transition-all duration-700 ease-in-out relative min-h-[120vh] pt-[20vh]">
            <!-- 占位符，防止吸顶抖动 -->
            <div id="sticky-holder" class="hidden w-full"></div>
            <!-- SEARCH & CATEGORY BAR SECTION -->
            <div id="search-nav-container" class="w-full transition-all duration-500 ease-in-out z-50">
                <section class="max-w-5xl mx-auto px-4 pr-12 md:px-8 py-3 md:py-6 flex flex-col items-center">
                    <form id="search-form" action="#" class="w-full max-w-2xl group relative" method="GET">
                        <!-- 搜索引擎选择下拉框 -->
                        <div class="absolute inset-y-0 left-2 flex items-center pl-1 md:pl-2 z-10 w-[4.5rem] md:w-24">
                            <select id="search-engine-select" class="w-full bg-transparent bg-none text-gray-600 dark:text-on-surface-variant border-none focus:ring-0 text-xs md:text-sm font-medium cursor-pointer appearance-none pr-4 md:pr-6 outline-none">
                                <option value="local">本站</option>
                                <option value="bing">Bing</option>
                                <option value="google">Google</option>
                                <option value="baidu">百度</option>
                            </select>
                            <span class="material-symbols-outlined text-gray-400 dark:text-on-surface-variant absolute right-0 md:right-1 pointer-events-none text-[16px] md:text-[18px]">expand_more</span>
                        </div>
                        
                        <!-- 分割线 -->
                        <div class="absolute inset-y-2 md:inset-y-3 left-[5rem] md:left-[7rem] w-px bg-gray-300 dark:bg-outline-variant/50 z-10"></div>

                        <!-- 搜索图标 -->
                        <div class="absolute inset-y-0 left-[5.5rem] md:left-[8rem] flex items-center pointer-events-none z-10">
                            <span class="material-symbols-outlined text-gray-400 dark:text-on-surface-variant group-focus-within:text-tertiary transition-colors text-lg md:text-2xl" data-icon="search">search</span>
                        </div>
                        
                        <input id="search-input" class="w-full bg-white dark:bg-surface-container-lowest border border-gray-200 dark:border-none rounded-xl py-3 md:py-4 pl-[7.5rem] md:pl-[10.5rem] pr-12 md:pr-16 text-sm md:text-lg focus:ring-2 focus:ring-tertiary/20 focus:scale-102 transition-all duration-500 ease-out text-gray-800 dark:text-on-surface placeholder:text-gray-400 dark:placeholder:text-outline shadow-md" name="q" placeholder="搜索一下..." type="text" autocomplete="off"/>
                        
                        <div class="absolute right-3 md:right-4 inset-y-0 flex items-center z-10">
                            <kbd class="hidden md:inline-flex items-center rounded border border-gray-200 dark:border-outline-variant px-2 py-1 text-xs text-gray-400 dark:text-outline font-sans">⌘ K</kbd>
                        </div>
                    </form>
                    
                    <!-- CATEGORY BAR (Dynamically populated) -->
                    <div class="w-full mt-3 md:mt-6 flex items-center justify-center">
                        <div id="category-bar" class="flex space-x-2 overflow-x-auto hide-scrollbar pb-2 mask-fade-edges pl-2 pr-2 md:pr-0">
                            <!-- Categories will be injected here -->
                        </div>
                    </div>
                </section>
            </div>

            <!-- TOP 4 RECOMMENDED SITES SECTION -->
            <section id="recommended-section" class="max-w-7xl mx-auto px-8 pt-6 pb-4 flex flex-col items-center w-full transition-opacity duration-500 ease-in-out opacity-100">
                <h2 class="text-xl md:text-2xl font-extrabold font-manrope tracking-tighter text-center mb-6 text-gray-800 dark:text-on-surface">
                    常用推荐
                </h2>
                <div id="recommended-grid" class="grid grid-cols-2 md:grid-cols-2 lg:grid-cols-4 gap-4 md:gap-6 w-full">
                    <!-- Recommended items will be injected here -->
                </div>
            </section>
        </div>

        <!-- CONTENT GRID AREA (Initially hidden) -->
        <section class="max-w-7xl mx-auto px-8 py-12 w-full hidden opacity-0 transition-opacity duration-700 ease-in-out" id="main-content">
            <!-- Main content will be injected here -->
        </section>

        <!-- FOOTER -->
        <footer class="bg-gray-50 dark:bg-surface-dim pt-24 pb-12 mt-auto">
            <div class="w-full max-w-7xl mx-auto px-8 flex flex-col md:flex-row justify-between items-center opacity-80 hover:opacity-100 transition-opacity">
                <p class="font-inter text-xs uppercase tracking-widest text-gray-500 dark:text-on-surface-variant mb-4 md:mb-0">
                    © 2024 THE NOIR CURATOR. ALL RIGHTS RESERVED.
                </p>
            </div>
        </footer>
    </main>

    <script src="index.js"></script>
</body>
</html>
